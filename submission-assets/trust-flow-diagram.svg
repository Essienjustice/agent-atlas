    .step{fill:#f7f8fb;stroke:#d9dee8;stroke-width:2;rx:8}
    .title{font:700 18px Arial;fill:#18202f}
    .text{font:13px Arial;fill:#667085}
    .arrow{font:700 30px Arial;fill:#0f8f68}
  </style>
  <rect class="step" x="25" y="70" width="150" height="95"/>
