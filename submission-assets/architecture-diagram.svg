  <text class="text" x="325" y="174">SSE event stream</text>
  <rect class="box" x="540" y="80" width="180" height="110"/>
  <text class="title" x="570" y="125">Indexer</text>
  <text class="text" x="570" y="152">Mantle events</text>
  <text class="text" x="570" y="174">Proof history</text>
  <rect class="box" x="290" y="260" width="430" height="110"/>
