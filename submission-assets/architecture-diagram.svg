  <line class="arrow" x1="220" y1="135" x2="290" y2="135"/>
  <line class="arrow" x1="470" y1="135" x2="540" y2="135"/>
  <line class="arrow" x1="630" y1="190" x2="630" y2="260"/>
  <line class="arrow" x1="380" y1="260" x2="380" y2="190"/>
</svg>
