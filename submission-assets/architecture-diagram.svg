<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f7f8fb"/>
  <style>
    .box{fill:#fff;stroke:#d9dee8;stroke-width:2;rx:8}
    .title{font:700 20px Arial;fill:#18202f}
    .text{font:14px Arial;fill:#667085}
    .arrow{stroke:#0f8f68;stroke-width:3;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f8f68"/></marker></defs>
  <rect class="box" x="40" y="80" width="180" height="110"/>
  <text class="title" x="70" y="125">Frontend</text>
  <text class="text" x="70" y="152">Reputation UI</text>
  <text class="text" x="70" y="174">Live verification</text>
  <rect class="box" x="290" y="80" width="180" height="110"/>
